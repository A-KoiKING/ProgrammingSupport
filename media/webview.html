<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <style>
        body {
            font-family: var(--vscode-font-family);
            color: var(--vscode-foreground);
            padding: 15px;
        }

        .section {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--vscode-panel-border);
            padding-bottom: 10px;
        }

        .label {
            color: var(--vscode-descriptionForeground);
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .value {
            font-weight: 600;
            font-size: 1.1em;
            word-break: break-all;
        }

        .type-tag {
            background-color: var(--vscode-textBlockQuote-background);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
            color: var(--vscode-symbolIcon-variableForeground);
        }
    </style>
</head>

<body>
    <div class="section">
        <div class="label">Variable Name</div>
        <div id="var-name" class="value">-</div>
    </div>
    <div class="section">
        <div class="label">Type / Definition</div>
        <div id="var-type" class="type-tag">-</div>
    </div>
    <div class="section">
        <div class="label">Position</div>
        <div id="var-pos" class="value">-</div>
    </div>

    <script nonce="{{nonce}}">
        const vscode = acquireVsCodeApi();
        window.addEventListener('message', event => {
            const message = event.data;
            if (message.type === 'update') {
                document.getElementById('var-name').textContent = message.word;
                document.getElementById('var-type').textContent = message.typeInfo;
                document.getElementById('var-pos').textContent = `Line ${message.line}, Col ${message.character}`;
            }
        });
    </script>
</body>

</html>
